<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emby 终端下载中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', system-ui, sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .highlight-border { border: 2px solid #38bdf8 !important; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="antialiased">

    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-sky-500 rounded-lg flex items-center justify-center"><i class="fas fa-play text-white"></i></div>
            <span class="text-xl font-bold tracking-tight">Emby <span class="text-sky-400">Hub</span></span>
        </div>
    </nav>

    <section class="text-center pt-12 pb-8 px-4">
        <div id="os-badge" class="inline-block mb-4 px-4 py-1 rounded-full bg-sky-500/20 text-sky-400 text-sm font-bold border border-sky-500/30">
            正在识别您的设备系统...
        </div>
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tighter">
            获取最适合您的 <span class="gradient-text">Emby 客户端</span>
        </h1>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div id="card-android" class="glass-card p-8 rounded-3xl flex flex-col group transition-all">
                <div class="mb-6 flex justify-between items-start">
                    <div class="w-16 h-16 bg-pink-500/20 text-pink-500 rounded-2xl flex items-center justify-center text-3xl"><i class="fab fa-android"></i></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-pink-500 bg-pink-500/10 px-3 py-1 rounded-full">Android</span>
                </div>
                <h3 class="text-2xl font-bold mb-2">Yamby</h3>
                <p class="text-slate-400 mb-8 flex-grow">Android 手机与电视盒子的最佳选择。</p>
                <a href="#" class="w-full py-4 bg-slate-700 group-hover:bg-sky-500 rounded-2xl text-center font-bold transition-colors">立即下载 APK</a>
            </div>

            <div id="card-windows" class="glass-card p-8 rounded-3xl flex flex-col group transition-all">
                <div class="mb-6 flex justify-between items-start">
                    <div class="w-16 h-16 bg-blue-500/20 text-blue-500 rounded-2xl flex items-center justify-center text-3xl"><i class="fab fa-windows"></i></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-blue-500 bg-blue-500/10 px-3 py-1 rounded-full">Windows</span>
                </div>
                <h3 class="text-2xl font-bold mb-2">Emby Desktop</h3>
                <p class="text-slate-400 mb-8 flex-grow">PC 端原生体验，支持硬解，播放 4K 不卡顿。</p>
                <a href="#" class="w-full py-4 bg-slate-700 group-hover:bg-sky-500 rounded-2xl text-center font-bold transition-colors">下载 Windows 版</a>
            </div>

            <div id="card-ios" class="glass-card p-8 rounded-3xl flex flex-col group transition-all">
                <div class="mb-6 flex justify-between items-start">
                    <div class="w-16 h-16 bg-white/20 text-white rounded-2xl flex items-center justify-center text-3xl"><i class="fab fa-apple"></i></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-white bg-white/10 px-3 py-1 rounded-full">iOS / macOS</span>
                </div>
                <h3 class="text-2xl font-bold mb-2">VidHub</h3>
                <p class="text-slate-400 mb-8 flex-grow">苹果生态首选，海报墙精美，操作丝滑。</p>
                <a href="#" class="w-full py-4 bg-slate-700 group-hover:bg-sky-500 rounded-2xl text-center font-bold transition-colors">前往 App Store</a>
            </div>

        </div>
    </main>

    <script>
        function detectOS() {
            const userAgent = window.navigator.userAgent;
            const platform = window.navigator.platform;
            const osBadge = document.getElementById('os-badge');
            
            let detected = "未知设备";
            let targetCard = null;

            if (/Android/.test(userAgent)) {
                detected = "检测到您正在使用 Android 设备";
                targetCard = document.getElementById('card-android');
            } else if (/iPhone|iPad|iPod/.test(userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
                detected = "检测到您正在使用 iOS 设备";
                targetCard = document.getElementById('card-ios');
            } else if (/Win/.test(platform)) {
                detected = "检测到您正在使用 Windows 电脑";
                targetCard = document.getElementById('card-windows');
            } else if (/Mac/.test(platform)) {
                detected = "检测到您正在使用 macOS 设备";
                targetCard = document.getElementById('card-ios');
            }

            // 更新顶部文案
            osBadge.innerHTML = `<i class="fas fa-magic mr-2"></i>${detected} - 已为您智能推荐`;
            
            // 高亮对应卡片
            if (targetCard) {
                targetCard.classList.add('highlight-border');
                // 平滑滚动到推荐位（如果在手机上）
                if(window.innerWidth < 768) {
                    targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        // 页面加载完成后执行识别
        window.onload = detectOS;
    </script>
</body>
</html>
